name: Build VisionClaw IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      scheme:
        description: 'Xcode Scheme to build (optional)'
        required: false
        default: 'VisionClaw'

jobs:
  build-ipa:
    runs-on: macos-latest
    defaults:
      run:
        shell: bash
    env:
      XCODE_VERSION_MINIMUM: "14.0"
      ARCHIVE_PATH: './build/Release.xcarchive'
      CONFIGURATION: 'Release'
      CODE_SIGNING_ALLOWED: 'NO'

    steps:
      # Step 1: Checkout with LFS & Submodules
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # Step 2: Validate Xcode Installation
      - name: Verify Xcode Version
        run: |
          echo "🔍 Checking Xcode version..."
          XCODE_VERSION=$(xcodebuild -version 2>/dev/null | awk '{print $2}')
          if [[ -z "$XCODE_VERSION" || "$XCODE_VERSION" < "14.0" ]]; then
            echo "::error::Xcode 14.0 or higher required (current: $XCODE_VERSION)"
            exit 1
          fi
          echo "✅ Using Xcode version: $XCODE_VERSION"

      # Step 3: Find and Verify Project/Workspace
      - name: Discover Project Structure
        id: project_info
        run: |
          set -e
          
          SCRIPT_DIR="${GITHUB_WORKSPACE}"
          PROJECT_PATH=""
          WORKSPACE_FLAG="-project"
          WORKSPACE_NAME="VisionClaw.xcodeproj"

          echo "🔍 Searching for Xcode project..."
          
          # Priority 1: Check for xcworkspace (preferred)
          if [ -d "./*/xcworkspace" ]; then
            WORKSPACE_PATH=$(ls -d */xcworkspace/ | head -n 1)
            PROJECT_PATH=$(dirname "$WORKSPACE_PATH")
            WORKSPACE_FLAG="-workspace $PROJECT_PATH/*/*.xcworkspace"
            echo "📁 Using Workspace: $(basename "$WORKSPACE_PATH")" >> "$GITHUB_OUTPUT"
          # Priority 2: Look for xcodeproj directly in root
          elif [ -d "./*/xcodeproj" ]; then
            XCODEPROJ_ROOT=$(ls -d */xcodeproj | head -n 1)
            WORKSPACE_FLAG="-project $XCODEPROJ_ROOT/*.xcodeproj"
            PROJECT_PATH=$(dirname "$XCODEPROJ_ROOT")
            echo "📁 Using Project: $(basename "$XCODEPROJ_ROOT")" >> "$GITHUB_OUTPUT"
          # Priority 3: Single project file in root
          elif [ -f "*.xcodeproj" ]; then
            XCODEPROJ_PATH=$(ls -d *.xcodeproj | head -n 1)
            PROJECT_PATH=$(dirname "$XCODEPROJ_PATH")
            WORKSPACE_FLAG="-project $PROJECT_PATH/*.xcodeproj"
            echo "📁 Using Project: $(basename "$XCODEPROJ_PATH")" >> "$GITHUB_OUTPUT"
          else
            echo "::error::No Xcode project/workspace found in repository!"
            exit 1
          fi

          # Install CocoaPods if Podfile exists
          if [ -f "${SCRIPT_DIR}/Podfile" ]; then
            PODFILE_EXISTS=true
            if [ ! -f "${SCRIPT_DIR}/Podfile.lock" ]; then
              echo "📦 Installing CocoaPods dependencies..."
              cd "$PROJECT_PATH" || exit 1
              pod install --verbose
            fi
            cd "$SCRIPT_DIR" || exit 1
          else
            echo "⚠️ No Podfile found - skipping dependency installation"
          fi

          # Validate project exists and find main target
          PROJECT_FILE="$WORKSPACE_FLAG"
          MAIN_TARGET=$(xcodebuild -list "${PROJECT_FILE}" -json 2>/dev/null | python3 -c "import sys, json; data=json.load(sys.stdin); print([t['name'] for t in data.get('targets',[])][0])") or echo "MainTargetUnknown"
          
          # If JSON parsing failed, try fallback method
          if [[ "$MAIN_TARGET" == *"Error"* || -z "$MAIN_TARGET" ]]; then
            MAIN_TARGET="VisionClaw"  # Default fallback
            echo "⚠️ Target auto-detected as: $MAIN_TARGET" >> "$GITHUB_OUTPUT"
          else
            echo "✅ Target detected as: $MAIN_TARGET" >> "$GITHUB_OUTPUT"
          fi

          echo "PROJECT_FILE=$WORKSPACE_FLAG" >> $GITHUB_OUTPUT
          PROJECT_DIR="$SCRIPT_DIR" >> $GITHUB_OUTPUT

      # Step 4: Build Archive with Robust Xcodebuild
      - name: Build xcarchive
        id: build_archive
        run: |
          set -e
          
          cd "${{ steps.project_info.outputs.PROJECT_DIR }}" || exit 1
          
          SCHEME="${{ github.event.inputs.scheme || 'VisionClaw' }}"
          PROJECT_FILE="${{ steps.project_info.outputs.PROJECT_FILE }}"
          OUTPUT_ARCHIVE="./build/Release.xcarchive"
          
          echo "🔧 Building scheme: $SCHEME"
          echo "📁 Project flags: $PROJECT_FILE"

          # Clean and build archive with correct flags
          xcodebuild \
            -workspace $(echo "$PROJECT_FILE" | grep -o '\-workspace [^ ]*' | cut -d' ' -f2) \
            -project $(echo "$PROJECT_FILE" | grep -o '\-project [^ ]*' | cut -d' ' -f2) \
            -scheme "${SCHEME}" \
            -configuration "${CONFIGURATION}" \
            -archivePath "$(dirname $OUTPUT_ARCHIVE)" \
            -destination='platform=iOS Simulator,name=iPhone 15 Pro' \
            ONLY_ACTIVE_ARCH=NO \
            SWIFT_COMPILATION_MODE=wholemodule \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGN_ENTITLEMENTS="" \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            ENABLE_PREVIEWS=NO \
            clean \
            archive || exit 1

          if [ ! -d "${OUTPUT_ARCHIVE}" ]; then
            echo "::error::Archive not created at: $OUTPUT_ARCHIVE"
            exit 1
          fi

          echo "✅ Archive created: $OUTPUT_ARCHIVE"
          mkdir -p Payload
          
          # Step 5: Extract App Bundle to Payload for IPA
          APP_BUNDLE_PATH="${OUTPUT_ARCHIVE}/Products/Applications/"$(basename ${SCHEME}).app
          APP_NAME=$(basename "${APP_BUNDLE_PATH}")

          if [ ! -d "$APP_BUNDLE_PATH" ]; then
            echo "::error::App bundle not found at: $APP_BUNDLE_PATH"
            exit 1
          fi

          echo "📦 Extracting app bundle: ${APP_NAME}"
          
          # Copy app to Payload (IPA structure)
          mkdir -p Payload/VisionClaw.app/
          cp -r "${APP_BUNDLE_PATH}"/* Payload/VisionClaw.app/

          # Step 6: Create Final IPA Package
          echo "📦 Creating IPA package..."
          zip -r9 ../VisionClaw.ipa Payload/VisionClaw.app

          # Cleanup old artifacts
          rm -rf "${OUTPUT_ARCHIVE}"/Products/*.app
          rm -rf ./Payload/
          
          echo "IPA_PATH=../VisionClaw.ipa" >> $GITHUB_OUTPUT
          
          # Step 7: Upload IPA Artifact
      - name: Upload VisionClaw IPA
        uses: actions/upload-artifact@v4
        with:
          name: VisionClaw-IPA
          path: |
            VisionClaw.ipa
          if-no-files-found: error
          retention-days: 30

      # Step 8: Validate Build Success
      - name: Verify IPA Validity
        run: |
          echo "🔍 Validating IPA structure..."
          
          if [ ! -f "VisionClaw.ipa" ]; then
            echo "::error::IPA not found!"
            exit 1
          fi

          # Validate IPAs have proper signature (even unsigned for testing)
          UNZIP_OUTPUT=$(unzip -q VisionClaw.ipa Payload/VisionClaw.app 2>&1 || true)
          
          if [[ "$UNZIP_OUTPUT" != *"no errors detected"* ]]; then
            echo "⚠️ Warning: IPA validation produced output:"
            echo "$UNZIP_OUTPUT"
          else
            echo "✅ IPA validated successfully!"
          fi

          # Check IPAsize (approximate)
          APP_SIZE=$(du -sh VisionClaw.ipa | awk '{print $1}')
          echo "📦 Final IPA size: ${APP_SIZE}"

