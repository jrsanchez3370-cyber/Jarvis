name: Build VisionClaw IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          # If there is a Podfile, install the pods
          if [ -f "Podfile" ]; then
            pod install
          fi

      - name: Build Unsigned Archive
        run: |
          # Detect if we should use Workspace or Project
          if [ -d *.xcworkspace ]; then
            FILE="-workspace $(ls -d *.xcworkspace | head -n 1)"
          else
            FILE="-project $(ls -d *.xcodeproj | head -n 1)"
          fi
          
          # Find the scheme
          SCHEME=$(xcodebuild -list -json | ruby -e "require 'json'; puts JSON.parse(STDIN.gets)['project']['targets'][0]")
          
          echo "Building with: $FILE using Scheme: $SCHEME"
          
          xcodebuild archive \
            $FILE \
            -scheme "$SCHEME" \
            -archivePath ./build/VisionClaw.xcarchive \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            CODE_SIGNING_FLAGS="--deep"

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r ./build/VisionClaw.xcarchive/Products/Applications/*.app ./Payload/
          zip -r VisionClaw.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VisionClaw-IPA
          path: VisionClaw.ipa
