name: Build VisionClaw IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      scheme:
        description: 'Xcode Scheme to build'
        required: true
        default: 'VisionClaw'
      configuration:
        description: 'Build configuration'
        required: true
        default: 'Release'
        type: choice
        options:
          - Release

jobs:
  build:
    runs-on: macos-latest
    defaults:
      run:
        shell: bash
    env:
      XCODE_VERSION_MINIMUM: "14.0"
      ARCHIVE_PATH: './build/Release.xcarchive'
      SCHEME: ${{ github.event.inputs.scheme || 'VisionClaw' }}
      CONFIGURATION: ${{ github.event.inputs.configuration || 'Release' }}

    steps:
      # 1. Checkout & Setup Environment
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Xcode version
        run: |
          XCODE_VERSION=$(xcodebuild -version | awk '{print $2}')
          if [[ "$XCODE_VERSION" < "14.0" ]]; then
            echo "::error::Requires Xcode 14.0 or higher (current: $XCODE_VERSION)"
            exit 1
          fi
          echo "Using Xcode version: $XCODE_VERSION"

      # 2. Setup Project & CocoaPods
      - name: Find and Prep Project
        id: prep
        run: |
          set -e
          
          # Detect workspace/project with preference for xcworkspace
          if [ -d "./*/xcodeproj" ] && [ -d "./*/xcworkspace" ]; then
            PROJECT_DIR=$(ls -d */xcodeproj/*.xcodeproj | head -1 | sed 's/\/.*\//')
            XCODE_FLAG="-workspace $PROJECT_DIR/*/*.xcworkspace -project $PROJECT_DIR/*/*.xcodeproj"
          elif [ -f "Podfile" ]; then
            PROJECT_DIR=$(pwd)
            XCODE_FLAG="-project $(ls -d *.xcodeproj 2>/dev/null | head -n1)"
            FILE_FLAG="-project $(ls -d *.xcodeproj | head -n1)"
          else
            echo "::error::No project/workspace found!"
            exit 1
          fi

          # Install CocoaPods (safe to skip if Podfile.lock exists)
          if [ -f "Podfile" ] && [ ! -f "Podfile.lock" ]; then
            echo "Installing dependencies..."
            pod install --verbose || true
          else
            echo "Dependencies appear installed. Skipping pod install."
          fi

          echo "dir=$PROJECT_DIR" >> $GITHUB_OUTPUT
          echo "FILE_FLAG=$XCODE_FLAG" >> $GITHUB_OUTPUT

      # 3. Build Unsigned Archive with Correct Flags
      - name: Build Signed xcarchive (Ad-Hoc)
        id: build_archive
        run: |
          set -e
          cd "${{ steps.prep.outputs.dir }}" || exit 1

          SCHEME="${{ env.SCHEME }}"
          CONFIGURATION="${{ env.CONFIGURATION }}"

          # Validate project file exists
          PROJECT_FILE=$(find . -maxdepth 1 -name "*.xcodeproj" -o -name "*.xcworkspace" | head -1)
          if [ ! -f "$PROJECT_FILE" ]; then
            echo "::error::No valid Xcode project/workspace found."
            exit 1
          fi

          echo "🔧 Building scheme: $SCHEME"
          echo "📁 Project: $PROJECT_FILE"
          echo "📦 Output: ${{ env.ARCHIVE_PATH }}"

          # Generate archive with correct flags for IPA build
          xcodebuild \
            -workspace "$PROJECT_FILE" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -archivePath "${{ env.ARCHIVE_PATH }}" \
            -sdk iphonesimulator \
            -destination='platform=iOS Simulator,name=iPhone 15 Pro' \
            ONLY_ACTIVE_ARCH=NO \
            SWIFT_COMPILATION_MODE=wholemodule \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGN_ENTITLEMENTS="" \
            CODE_SIGN_IDENTITY="" \
            ALLOW_PROVISIONING_UPDATES=YES \
            ENABLE_PREVIEWS=NO \
            clean \
            archive || true

          # Validate archive creation
          if [ ! -d "${{ env.ARCHIVE_PATH}}" ]; then
            echo "::error::Archive generation failed!"
            exit 1
          fi
          echo "✅ Archive created successfully."

      # 4. Package IPA from Archive
      - name: Create IPA from xcarchive
        run: |
          set -e
          
          APP_BUNDLE=$(find "${{ env.ARCHIVE_PATH}}" -type d -name "*.app" 2>/dev/null | head -1)
          if [ -z "$APP_BUNDLE" ]; then
            echo "⚠️ App bundle not found at: ${ARCHIVE_PATH}/Products/Applications/*"
            exit 1
          fi

          echo "📦 Extracting app bundle from archive..."
          mkdir -p Payload
          
          # Copy app bundle to Payload (IPA structure)
          cp -r "$APP_BUNDLE" ./Payload/

          # Remove empty subdirectories if they exist
          rm -rf Payload/*/* || true
          
          echo "📦 Packaging IPA..."
          zip -r9 ../VisionClaw.ipa Payload/VisionClaw.app

      # 5. Upload Artifact & Cleanup
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VisionClaw-IPA
          path: |
            VisionClaw.ipa
            build/Release.xcarchive
          if-no-files-found: error
          retention-days: 30

      - name: Cleanup Xcode Cache
        run: |
          # Remove cached artifacts to save disk space
          rm -rf "${{ env.ARCHIVE_PATH}}" \
                "$(dirname "${ARCHIVE_PATH}"/Products)/" 
          echo "🧹 Cleaned up build artifacts."
