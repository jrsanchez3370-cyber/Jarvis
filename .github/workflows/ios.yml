name: Build VisionClaw IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      scheme:
        description: 'Xcode Scheme to build'
        required: false
        default: 'VisionClaw'
      configuration:
        description: 'Build configuration'
        required: true
        default: 'Release'

jobs:
  build:
    runs-on: macos-14
    
    steps:
      # Step 1: Checkout Code (with all dependencies)
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # Step 2: Validate Xcode Installation
      - name: Verify macOS and Xcode Environment
        run: |
          SWIFT_VERSION=$(xcrun swiftc --version 2>&1 || echo "5.9")
          echo "✅ Swift version available"
          
          XCODE_PATH=$(which xcodebuild)
          if [ -z "$XCODE_PATH" ]; then
            echo "::error::xcodebuild not found! Please check macOS is updated."
            exit 1
          fi
          echo "✅ Using: $XCODE_PATH"

      # Step 3: Detect Project Location (Simplified & Reliable)
      - name: Find Xcode Project Files
        id: find_project
        run: |
          set -e
          
          ROOT_DIR="${GITHUB_WORKSPACE}"
          
          # Check if Podfile exists at root
          if [ -f "${ROOT_DIR}/Podfile" ]; then
            echo "✅ Podfile found in repository root!"
            
            # Look for project in same directory as Podfile
            PROJECT_FILE=""
            WORKSPACE_FLAG="-project"
            
            if [ -d "${ROOT_DIR}/*.xcodeproj" ]; then
              PROJECT_FILE=$(ls ${ROOT_DIR}/*.xcodeproj 2>/dev/null | head -n1)
              echo "✅ Xcode project found: $(basename $PROJECT_FILE)" >> "$GITHUB_OUTPUT"
              WORKSPACE_FLAG="-project"
            elif [ -d "${ROOT_DIR}/*.xcworkspace" ]; then
              PROJECT_FILE=$(ls ${ROOT_DIR}/*.xcworkspace 2>/dev/null | head -n1)
              echo "✅ Xcode workspace found: $(basename $PROJECT_FILE)" >> "$GITHUB_OUTPUT"
              WORKSPACE_FLAG="-workspace"
            else
              echo "::error::No .xcodeproj or .xcworkspace found in root directory!"
              ls -la "${ROOT_DIR}"
              exit 1
            fi
            
            # Also check if project is inside a subdirectory (e.g. VisionClaw/VisionClaw.xcodeproj)
            if [ ! -f "$PROJECT_FILE" ]; then
              while IFS= read -r dir; do
                PROJECT_FILE=$(ls "${dir}/*.xcodeproj" 2>/dev/null | head -n1) || continue
                if [ ! -z "$PROJECT_FILE" ] && [ -f "$PROJECT_FILE" ]; then
                  echo "✅ Found project in subdirectory: $(basename $PROJECT_FILE)" >> "$GITHUB_OUTPUT"
                  break
                fi
              done < <(find . -maxdepth 2 -type d -name "*xcodeproj" | head -n5)
            fi
            
            WORKSPACE_FLAG="-project"
          else
            echo "⚠️ No Podfile found in root. Looking for project directly..."
            
            # Search common locations
            PROJECT_FILE=$(ls ${ROOT_DIR}/*.xcodeproj 2>/dev/null | head -n1) || true
            
            if [ -z "$PROJECT_FILE" ]; then
              echo "❌ No Xcode project found!"
              
              echo "📁 Repository structure:"
              ls -la "${ROOT_DIR}" || true
              exit 1
            fi
          fi

          # Store workspace flag for later use
          if [ -z "$PROJECT_FILE" ]; then
            echo "::error::Could not find any Xcode project!"
            exit 1
          fi
          
          echo "PROJECT_PATH=${PROJECT_FILE}" >> "$GITHUB_OUTPUT"
          echo "WORKSPACE_FLAG=$WORKSPACE_FLAG" >> "$GITHUB_OUTPUT"

      # Step 4: Setup Pods if needed
      - name: Install CocoaPods Dependencies
        id: pods
        run: |
          set -e
          
          ROOT_DIR="${{ steps.find_project.outputs.ROOT_DIR }}"
          
          cd "${ROOT_DIR}" || exit 1
          
          if [ ! -f "Podfile" ]; then
            echo "⚠️ No Podfile found - proceeding without CocoaPods"
          elif [ ! -d "Pods" ]; then
            echo "📦 Installing CocoaPods dependencies..."
            pod install --verbose || exit 1
          else
            echo "✅ Pods already installed. Skipping."
          fi

      # Step 5: Build Xcode Archive
      - name: Build Release xcarchive
        run: |
          set -e
          
          ROOT_DIR="${GITHUB_WORKSPACE}"
          SCHEME=${{ github.event.inputs.scheme }}
          CONFIGURATION=${{ github.event.inputs.configuration || 'Release' }}
          ARCHIVE_PATH="${ROOT_DIR}/build/Release.xcarchive"
          
          # Default scheme if not provided
          if [ -z "$SCHEME" ]; then
            echo "⚠️ No scheme specified in workflow, defaulting to VisionClaw"
            SCHEME="VisionClaw"
          fi
          
          PROJECT_FILE="${{ steps.find_project.outputs.PROJECT_PATH }}"
          
          cd "$ROOT_DIR" || exit 1
          
          echo "🔧 Building: $SCHEME"
          echo "📁 Project file: $PROJECT_FILE"
          
          # Extract the workspace flag value (remove -workspace/-project prefix)
          WORKSPACE_TYPE=$(echo "${{ steps.find_project.outputs.WORKSPACE_FLAG }}" | cut -d' ' -f1-)
          
          xcodebuild archive \
            $WORKSPACE_TYPE "$PROJECT_FILE" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -archivePath "$(dirname "$ARCHIVE_PATH")" \
            -destination='platform=iOS Simulator,name=iPhone 15 Pro' \
            ONLY_ACTIVE_ARCH=NO \
            SWIFT_COMPILATION_MODE=wholemodule \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_PREVIEWS=NO \
            clean \
            archive || {
              echo "❌ Archive build failed!"
              exit 1
            }

          if [ ! -d "$ARCHIVE_PATH" ]; then
            echo "::error::Archive not created at: $ARCHIVE_PATH"
            ls -la "$(dirname $ARCHIVE_PATH)"
            exit 1
          fi

          echo "✅ Archive created successfully!"

      # Step 6: Extract App Bundle from Archive
      - name: Extract App Bundle for IPA
        run: |
          set -e
          
          ARCHIVE_PATH="${GITHUB_WORKSPACE}/build/Release.xcarchive"
          PRODUCTS_DIR="${ARCHIVE_PATH}/Products/Applications/"
          
          echo "🔍 Looking for .app in archive:"
          ls -la "$PRODUCTS_DIR" || exit 1
          
          # Find all app bundles (there might be multiple frameworks)
          APP_BUNDLE=$(ls $PRODUCTS_DIR/*.app 2>/dev/null | head -n1)
          
          if [ -z "$APP_BUNDLE" ]; then
            echo "❌ No .app bundle found in Products/Applications/"
            ls -R "$PRODUCTS_DIR" || true
            exit 1
          fi
          
          APP_NAME=$(basename "$APP_BUNDLE")
          echo "✅ Found app bundle: ${APP_NAME}"

      # Step 7: Create Payload and IPA
      - name: Package IPA File
        run: |
          set -e
          
          cd "${GITHUB_WORKSPACE}" || exit 1
          
          mkdir -p Payload/${APP_NAME}.app/ || true
          
          # Copy extracted app files to payload
          if [ -f "$APP_BUNDLE" ]; then
            cp -r "$(dirname $APP_BUNDLE)"/* Payload/${APP_NAME}.app/
            
            if [ ! -d "Payload/${APP_NAME}.app" ]; then
              echo "❌ App bundle copy failed!"
              ls -la Payload/ || true
              exit 1
            fi
          else
            # If single app file in archive, copy it directly
            cp -r "$PRODUCTS_DIR"/* Payload/${APP_NAME}.app/ || true
          fi
          
          echo "✅ App bundle prepared in Payload/"
          
          # Verify files exist
          if [ ! -d "Payload/${APP_NAME}.app" ]; then
            echo "::error::Payload directory missing!"
            ls -la Payload/ || true
            exit 1
          fi

          # Create final IPA zip
          zip -r9 VisionClaw.ipa Payload/${APP_NAME}.app || {
            echo "❌ Failed to create IPA!"
            zip -l VisionClaw.ipa || true
            exit 1
          }
          
          if [ ! -f "VisionClaw.ipa" ]; then
            echo "::error::IPA file not created!"
            ls -la VisionClaw.ipa || true
            exit 1
          fi

          IPA_SIZE=$(du -h VisionClaw.ipa | awk '{print $1}')
          echo "✅ IPA created: ${APP_NAME}.app (size: ${IPA_SIZE})" >> "$GITHUB_OUTPUT"

      # Step 8: Upload Artifact
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VisionClaw-IPA-${{ github.sha }}
          path: |
            VisionClaw.ipa
          if-no-files-found: error
          retention-days: 30

